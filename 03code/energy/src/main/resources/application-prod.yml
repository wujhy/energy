# 数据源配置
spring:
    datasource:
        type: com.alibaba.druid.pool.DruidDataSource
        driverClassName: org.sqlite.JDBC
        url: jdbc:sqlite:/opt/energy/config/rysqlite3.db?date_string_format=yyyy-MM-dd HH:mm:ss&journal_mode=WAL&synchronous=NORMAL&busy_timeout=2000
        username:
        password:
        druid:
            # 初始连接数
            initialSize: 2
            # 最小连接池数量
            minIdle: 2
            # 最大连接池数量
            maxActive: 15
            # 配置获取连接等待超时的时间
            maxWait: 10000
            # 配置间隔多久才进行一次检测，检测需要关闭的空闲连接，单位是毫秒
            timeBetweenEvictionRunsMillis: 60000
            # 配置一个连接在池中最小生存的时间，单位是毫秒
            minEvictableIdleTimeMillis: 300000
            # 配置一个连接在池中最大生存的时间，单位是毫秒
            maxEvictableIdleTimeMillis: 900000
            # 配置检测连接是否有效 DUAL,未设置则testOnBorrow、testOnReturn、testWhileIdle都不会起作用
            validationQuery: SELECT 1 FROM sys_user
            testWhileIdle: true
            testOnBorrow: false
            testOnReturn: false
            filter:
                stat:
                    enabled: false
                    log-slow-sql: false
                    slow-sql-millis: 2000
                    merge-sql: false
                wall:
                    enabled: false

# 系统配置
sys:
    # 项目名称
    name: 蓄电池监控系统
    # 项目部署根路径
    deployPath: /opt/energy
    # 项目部署日期yyyyMMdd
    deployDay: 20250616

#设备通讯配置
device-comm:
    # 通讯协议类型：tcp、port、mqtt、modbus
    commType: port
    # tcp 配置（是否使用、端口号、连接线程数、读写线程数、队列长度、心跳间隔秒）
    tcpPost: 22188
    tcpBossThread: 2
    tcpWorkerThread: 4
    tcpBackLog: 200
    tcpIntervalTime: 120
    # 串口配置（是否使用、串口名、波特率、数据位、停止位、校验位、超时时间）
    portName: ttyS9
    portBaudRate: 115200
    portDataBits: 8
    portStopBits: 1
    portParity: 0
    portTimeout: 1000

# 多线程配置
thread:
    #执行任务线程池配置
    corePoolSize: 4
    maxPoolSize: 30
    queueCapacity: 500
    keepAliveSeconds: 100

# 定时任务配置
job:
    # 更新缓存（设备、告警、电池）
    configCache: "0 0 * * * ?"
    alarmCache: "20 0 * * * ?"
    batteryCache: "40 0 * * * ?"
    #定时同步电池告警配置（是否开启，调度时间）
    isSynBattery: true
    cmdSynBattery: "50 0 * * * ?"
    cmdSynBatteryStatus: "0/10 0 * * * ?"
    #清理指定月份日志（电池监控记录天数，系统操作日志月数，调度时间，包含今天数据就是N+1）
    cleanBatteryReportDays: 2
    cleanSysLogMonth: 2
    cleanLog: "5 10 0 * * ?"
    #定时下发存储指令（52、57）
    #定时同步设备在线状态（最大校验次数，调度时间）
    offlineNum: 3
    deviceOnline: "0/20 * * * * ?"
    #定时同步设备通用信息（服务器时间）
    device: "0 0 0/12 * * ?"
    #定时喂狗
    watchDog: "0/5 * * * * ?"
    #声光告警（是否开启，端口号，定时调度）
    isOpenSoundWarn: true
    portSoundWarn: 5
    checkSoundWarnCron: "0/10 * * * * ?"
    # 每天凌晨重启浏览器
    restartAppCron: "0 0 0 * * ?"

#同步上报平台
report:
    #定时数据监测上报、心跳上报、注册上报
    dataReport: "0/20 * * * * ?"
    heartbeat: "0 0/1 * * * ?"
    register: "0 0/10 * * * ?"

# 蓄电池独立采集模块
battery-collector:
    collector:
        enabled: false
        autoPollEnabled: false
        loopDelayMs: 300
        requestGapMs: 120
        debugEnabled: false
        rawFrameLogEnabled: false
        realtimeDataEnabled: false
        groupCalculationEnabled: false
        compatReportLogEnabled: false
        jsonTcpRealtimeSourceEnabled: false
        jsonTcpModuleCommandEnabled: false
        groupCalculationStaleThresholdMs: 180000
        moduleAddressCacheEnabled: true
        moduleAddressMissThreshold: 3
        moduleAddressFullDiscoveryIntervalMs: 0
        debugChannels: []
        activeChannels: []
        # 单通道联调示例：
        # enabled: true
        # autoPollEnabled: true
        # debugEnabled: true
        # debugChannels: [battery-group-1]
        # activeChannels: [battery-group-1]
        channels:
            - name: battery-group-1
              enabled: false
              portName: ttyS9
              baudRate: 9600
              dataBits: 8
              stopBits: 1
              parity: 0
              timeoutMs: 1000
              pollIntervalMs: 3000
              responseTimeoutMs: 1500
              readBufferSize: 2048
              receiveBufferLimit: 8192
              maxRetryCount: 2
              deviceAddress: 1
              moduleAddressStart: 1
              moduleAddressEnd: 246
              batteryPort: 1
              batteryChannel: 1
              batteryGroup: 1
